name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Run core tests
        run: make test

      - name: Build universal .app
        env:
          UNIVERSAL: '1'
        run: make app

      - name: Verify bundle
        run: make verify

      - name: Archive .app
        uses: actions/upload-artifact@v4
        with:
          name: LocationChanger.app
          path: build/LocationChanger.app
          retention-days: 7

  release:
    needs: test-and-build
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
      NOTARY_PROFILE: ${{ secrets.NOTARY_PROFILE }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if signing secrets missing
        id: check
        run: |
          if [ -z "$DEVELOPER_ID" ] || [ -z "$NOTARY_PROFILE" ]; then
            echo "signing secrets not configured; skipping release job"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing identity
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ secrets.DEVELOPER_ID_CERT_BASE64 }}" | base64 -d > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Register notary profile
        if: steps.check.outputs.skip == 'false'
        run: |
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build signed + notarised .app
        if: steps.check.outputs.skip == 'false'
        env:
          UNIVERSAL: '1'
        run: |
          make app
          make notarize
          make verify

      - name: Build DMG
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=${GITHUB_REF_NAME#v} make dmg

      - name: Upload release artefacts
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: build/LocationChanger-*.dmg
